<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9c27b0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9c27b0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- subtle center glow -->
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>

  <!-- connections (synapses) -->
  <g stroke="#7c4dff" stroke-width="2" stroke-opacity="0.4">
    <!-- core to ring 1 -->
    <line x1="256" y1="256" x2="256" y2="148"/>
    <line x1="256" y1="256" x2="349" y2="202"/>
    <line x1="256" y1="256" x2="349" y2="310"/>
    <line x1="256" y1="256" x2="256" y2="364"/>
    <line x1="256" y1="256" x2="163" y2="310"/>
    <line x1="256" y1="256" x2="163" y2="202"/>

    <!-- ring 1 interconnections -->
    <line x1="256" y1="148" x2="349" y2="202"/>
    <line x1="349" y1="202" x2="349" y2="310"/>
    <line x1="349" y1="310" x2="256" y2="364"/>
    <line x1="256" y1="364" x2="163" y2="310"/>
    <line x1="163" y1="310" x2="163" y2="202"/>
    <line x1="163" y1="202" x2="256" y2="148"/>

    <!-- ring 1 to ring 2 -->
    <line x1="256" y1="148" x2="220" y2="88"/>
    <line x1="256" y1="148" x2="292" y2="88"/>
    <line x1="349" y1="202" x2="410" y2="160"/>
    <line x1="349" y1="202" x2="400" y2="240"/>
    <line x1="349" y1="310" x2="400" y2="280"/>
    <line x1="349" y1="310" x2="410" y2="352"/>
    <line x1="256" y1="364" x2="292" y2="424"/>
    <line x1="256" y1="364" x2="220" y2="424"/>
    <line x1="163" y1="310" x2="112" y2="352"/>
    <line x1="163" y1="310" x2="102" y2="280"/>
    <line x1="163" y1="202" x2="102" y2="240"/>
    <line x1="163" y1="202" x2="112" y2="160"/>

    <!-- cross connections (ring 2) -->
    <line x1="220" y1="88" x2="112" y2="160"/>
    <line x1="292" y1="88" x2="410" y2="160"/>
    <line x1="400" y1="240" x2="400" y2="280"/>
    <line x1="410" y1="352" x2="292" y2="424"/>
    <line x1="220" y1="424" x2="112" y2="352"/>
    <line x1="102" y1="280" x2="102" y2="240"/>
  </g>

  <!-- active signal paths (amber) -->
  <g stroke="#ffc107" stroke-width="2.5" stroke-opacity="0.7">
    <line x1="256" y1="256" x2="349" y2="202"/>
    <line x1="349" y1="202" x2="410" y2="160"/>
    <line x1="256" y1="256" x2="163" y2="310"/>
    <line x1="163" y1="310" x2="112" y2="352"/>
    <line x1="256" y1="256" x2="256" y2="148"/>
    <line x1="256" y1="148" x2="220" y2="88"/>
  </g>

  <!-- ring 2 nodes (outer) -->
  <g fill="#5e35b1">
    <circle cx="220" cy="88" r="8"/>
    <circle cx="292" cy="88" r="8"/>
    <circle cx="410" cy="160" r="8"/>
    <circle cx="400" cy="240" r="8"/>
    <circle cx="400" cy="280" r="8"/>
    <circle cx="410" cy="352" r="8"/>
    <circle cx="292" cy="424" r="8"/>
    <circle cx="220" cy="424" r="8"/>
    <circle cx="112" cy="352" r="8"/>
    <circle cx="102" cy="280" r="8"/>
    <circle cx="102" cy="240" r="8"/>
    <circle cx="112" cy="160" r="8"/>
  </g>

  <!-- ring 1 nodes (inner ring) -->
  <g fill="#7c4dff">
    <circle cx="256" cy="148" r="12"/>
    <circle cx="349" cy="202" r="12"/>
    <circle cx="349" cy="310" r="12"/>
    <circle cx="256" cy="364" r="12"/>
    <circle cx="163" cy="310" r="12"/>
    <circle cx="163" cy="202" r="12"/>
  </g>

  <!-- active nodes (amber glow on signal path) -->
  <g>
    <circle cx="410" cy="160" r="8" fill="#ffc107" opacity="0.9"/>
    <circle cx="112" cy="352" r="8" fill="#ffc107" opacity="0.9"/>
    <circle cx="220" cy="88" r="8" fill="#ffc107" opacity="0.9"/>
    <circle cx="349" cy="202" r="12" fill="#ffc107" opacity="0.8"/>
    <circle cx="163" cy="310" r="12" fill="#ffc107" opacity="0.8"/>
    <circle cx="256" cy="148" r="12" fill="#ffc107" opacity="0.8"/>
  </g>

  <!-- core node -->
  <circle cx="256" cy="256" r="20" fill="#9c27b0"/>
  <circle cx="256" cy="256" r="14" fill="#ce93d8"/>
  <circle cx="256" cy="256" r="7" fill="#f3e5f5"/>
</svg>
